<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OverGrace — Painel Administrativo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="paineladm.css" />
  </head>
  <body>
    <div class="shell">
      <!-- ── SIDEBAR ──────────────────────────────────────── -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
          <div class="sidebar-logo-mark">OverGrace <span>Admin</span></div>
        </div>

        <nav class="sidebar-nav">
          <div class="nav-group">
            <div class="nav-group-label">Visão geral</div>
            <a
              class="nav-item"
              href="pages/dashboard.html"
              target="content"
              data-page="dashboard"
            >
              <svg
                class="nav-icon"
                fill="none"
                viewBox="0 0 16 16"
                stroke="currentColor"
                stroke-width="1.5"
              >
                <rect x="2" y="2" width="5" height="5" rx="1" />
                <rect x="9" y="2" width="5" height="5" rx="1" />
                <rect x="2" y="9" width="5" height="5" rx="1" />
                <rect x="9" y="9" width="5" height="5" rx="1" />
              </svg>
              Dashboard
            </a>
          </div>

          <div class="nav-group">
            <div class="nav-group-label">Catálogo</div>
            <a
              class="nav-item"
              href="pages/produtos.html"
              target="content"
              data-page="produtos"
            >
              <svg
                class="nav-icon"
                fill="none"
                viewBox="0 0 16 16"
                stroke="currentColor"
                stroke-width="1.5"
              >
                <path d="M2 4h12M4 8h8M6 12h4" />
              </svg>
              Produtos
            </a>
            <a
              class="nav-item"
              href="pages/estoque.html"
              target="content"
              data-page="estoque"
            >
              <svg
                class="nav-icon"
                fill="none"
                viewBox="0 0 16 16"
                stroke="currentColor"
                stroke-width="1.5"
              >
                <rect x="2" y="10" width="3" height="4" rx="1" />
                <rect x="6.5" y="6" width="3" height="8" rx="1" />
                <rect x="11" y="2" width="3" height="12" rx="1" />
              </svg>
              Estoque
              <span class="nav-badge" id="badge-estoque">3</span>
            </a>
          </div>

          <div class="nav-group">
            <div class="nav-group-label">Vendas</div>
            <a
              class="nav-item"
              href="pages/pedidos.html"
              target="content"
              data-page="pedidos"
            >
              <svg
                class="nav-icon"
                fill="none"
                viewBox="0 0 16 16"
                stroke="currentColor"
                stroke-width="1.5"
              >
                <path d="M2 3h12l-1.5 8H3.5L2 3z" />
                <circle cx="6" cy="14" r="1" />
                <circle cx="11" cy="14" r="1" />
              </svg>
              Pedidos
              <span class="nav-badge" id="badge-pedidos">7</span>
            </a>
            <a
              class="nav-item"
              href="pages/clientes.html"
              target="content"
              data-page="clientes"
            >
              <svg
                class="nav-icon"
                fill="none"
                viewBox="0 0 16 16"
                stroke="currentColor"
                stroke-width="1.5"
              >
                <circle cx="8" cy="5" r="3" />
                <path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6" />
              </svg>
              Clientes
            </a>
            <a
              class="nav-item"
              href="pages/cupons.html"
              target="content"
              data-page="cupons"
            >
              <svg
                class="nav-icon"
                fill="none"
                viewBox="0 0 16 16"
                stroke="currentColor"
                stroke-width="1.5"
              >
                <path
                  d="M2 5.5A1.5 1.5 0 013.5 4h9A1.5 1.5 0 0114 5.5V7a1 1 0 000 2v1.5A1.5 1.5 0 0112.5 12h-9A1.5 1.5 0 012 10.5V9a1 1 0 000-2V5.5z"
                />
                <path d="M6 4v8" stroke-dasharray="1 1" />
              </svg>
              Cupons
            </a>
          </div>

          <div class="nav-group">
            <div class="nav-group-label">Sistema</div>
            <a
              class="nav-item"
              href="pages/configuracoes.html"
              target="content"
              data-page="configuracoes"
            >
              <svg
                class="nav-icon"
                fill="none"
                viewBox="0 0 16 16"
                stroke="currentColor"
                stroke-width="1.5"
              >
                <circle cx="8" cy="8" r="2.5" />
                <path
                  d="M8 1v2M8 13v2M1 8h2M13 8h2M3.1 3.1l1.4 1.4M11.5 11.5l1.4 1.4M3.1 12.9l1.4-1.4M11.5 4.5l1.4-1.4"
                />
              </svg>
              Configurações
            </a>
          </div>
        </nav>

        <div class="sidebar-footer">
          <div class="sidebar-avatar">MF</div>
          <div class="sidebar-user-info">
            <div class="sidebar-user-name">Mary OverGrace</div>
            <div class="sidebar-user-role">Administrador</div>
          </div>
        </div>
      </aside>

      <!-- ── MAIN ──────────────────────────────────────────── -->
      <div class="main">
        <!-- Topbar (breadcrumb atualiza dinamicamente) -->
        <header class="topbar">
          <div class="topbar-breadcrumb" id="breadcrumb">
            <span>OverGrace</span>
            <svg
              width="12"
              height="12"
              fill="none"
              viewBox="0 0 12 12"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path d="M4 2l4 4-4 4" />
            </svg>
            <strong id="breadcrumb-page">Dashboard</strong>
          </div>
          <div class="topbar-actions">
            <div class="icon-btn topbar-notif" title="Notificações">
              <svg
                width="16"
                height="16"
                fill="none"
                viewBox="0 0 16 16"
                stroke="currentColor"
                stroke-width="1.5"
              >
                <path d="M8 2a5 5 0 015 5v3l1 2H2l1-2V7a5 5 0 015-5z" />
                <path d="M6.5 13a1.5 1.5 0 003 0" />
              </svg>
              <span class="notif-dot"></span>
            </div>
            <div class="icon-btn" title="Ir para a loja">
              <svg
                width="16"
                height="16"
                fill="none"
                viewBox="0 0 16 16"
                stroke="currentColor"
                stroke-width="1.5"
              >
                <path d="M10 3h3v3M13 3l-6 6M5 4H3v9h9v-2" />
              </svg>
            </div>
          </div>
        </header>

        <!-- iframe carrega o conteúdo de cada página -->
        <iframe
          class="content-frame"
          name="content"
          id="contentFrame"
          src="pages/dashboard.html"
          title="Conteúdo do painel"
        ></iframe>
      </div>
    </div>

    <script>
      const LABELS = {
        dashboard: "Dashboard",
        produtos: "Produtos",
        estoque: "Estoque",
        pedidos: "Pedidos",
        clientes: "Clientes",
        configuracoes: "Configurações",
      };

      // Ativa o item de nav correto e atualiza breadcrumb
      function setActive(page) {
        document.querySelectorAll(".nav-item").forEach((el) => {
          el.classList.toggle("active", el.dataset.page === page);
        });
        const label = LABELS[page] || page;
        document.getElementById("breadcrumb-page").textContent = label;
        document.title = label + " — OverGrace Admin";
      }

      // Intercepta cliques nos links da sidebar
      document.querySelectorAll(".nav-item[data-page]").forEach((link) => {
        link.addEventListener("click", () => {
          setActive(link.dataset.page);
        });
      });

      // Permite que páginas internas (dentro do iframe) sinalizem qual página estão
      window.addEventListener("message", (e) => {
        if (e.data && e.data.type === "navigate") {
          // Navega para outra página a partir do iframe
          const frame = document.getElementById("contentFrame");
          frame.src = "pages/" + e.data.page + ".html";
          setActive(e.data.page);
        } else if (e.data && e.data.type === "page") {
          setActive(e.data.name);
        }
      });

      // Estado inicial
      setActive("dashboard");
    </script>
  </body>
</html>
